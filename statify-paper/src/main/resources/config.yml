# Statify — конфигурация плагина.
# Внимание: при смене версии плагина этот файл будет автоматически переименован
# в config.old.<старая-версия>.yml, а на его месте будет создан новый.
config-version: '${version}'

# Имя сервера. Используется как раздел в БД, чтобы одна БД могла обслуживать
# несколько серверов и они не смешивались.
server-name: 'lobby'

database:
  # Тип БД: mysql, mariadb или none.
  # При значении none плагин отключится с предупреждением.
  type: 'none'
  host: 'localhost'
  port: 3306
  database: 'statify'
  username: 'statify'
  password: 'change_me'
  use-ssl: false
  # Размер пула Hikari.
  pool-size: 6

# Периодический flush в БД (минут). Обычно данные пишутся только при выходе
# игрока и при переходе через полночь, но для длинных сессий раз в N минут
# сохраняется страховочный снапшот — на случай падения сервера.
flush-interval-minutes: 15

# Форматирование времени для плейсхолдеров вроде %statify_total%.
# Нулевые компоненты пропускаются: 45s -> '45s', 5m 30s -> '5m 30s'.
format:
  suffix-day: 'd'
  suffix-hour: 'h'
  suffix-minute: 'm'
  suffix-second: 's'
  # Разделитель между компонентами (по умолчанию пробел).
  separator: ' '
  # Значение при нулевом времени.
  zero: '0s'
